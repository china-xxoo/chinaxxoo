<script>
(function fixedSlotOrderPatch() {
const SLOT_EMPTY = '';

const style = document.createElement('style');
style.textContent = `
.mgmt-card-position{
  flex:0 0 22px;
  height:20px;
  line-height:18px;
  margin-right:4px;

  color:#007bff;
  background:#fff;
  font-size:10px;
  font-weight:800;
  text-align:center;
  pointer-events:auto;
  cursor:pointer;
}
.mgmt-card-empty{
  background:#fafafa!important;
  border:1px dashed #d6d6d6!important;
  color:#bbb!important;
  cursor:default!important;
}

  border-color:#cfcfcf;

  cursor:default;

document.head.appendChild(style);

function normalizePhoneSlots(data, order) {
  const used = new Set();
  const slots = Array.isArray(order) ? order.map(phone => {
    const p = phone ? String(phone) : SLOT_EMPTY;
    if (p && data[p] && !used.has(p)) {
      used.add(p);
      return p;
    }
    return SLOT_EMPTY;
  }) : [];

  Object.keys(data || {}).forEach(phone => {
    if (!used.has(phone)) {
      slots.push(phone);
      used.add(phone);
    }
  });

  return slots;
}

function appendPhoneToLastSlot(order, phone) {
  const next = Array.isArray(order) ? order.slice() : [];
  next.push(phone);
  return next;
}

function removePhoneFromSlot(order, phone) {
  return (Array.isArray(order) ? order : []).map(p => p === phone ? SLOT_EMPTY : p);
}

function setPhoneSlotPosition(data, order, phone, targetPosition) {
  const next = normalizePhoneSlots(data, order);
  const targetIndex = targetPosition - 1;
  const currentIndex = next.indexOf(phone);

  while (next.length <= targetIndex) next.push(SLOT_EMPTY);

  if (next[targetIndex] && next[targetIndex] !== phone) return null;

  if (currentIndex !== -1) next[currentIndex] = SLOT_EMPTY;
  next[targetIndex] = phone;

  return next;
}

async function uploadFixedMain(actionDesc) {
  if (typeof uploadMainDataToGist === 'function') return uploadMainDataToGist(actionDesc);
  return uploadToGist(actionDesc);
}

async function uploadFixedLib(actionDesc) {
  if (typeof uploadLibDataToGist === 'function') return uploadLibDataToGist(actionDesc);
  return uploadToGistLib(actionDesc);
}

window.changePhonePosition = function(library, phone) {
  const isLib = library === 'lib';
  const data = isLib ? mgmtDataLib : mgmtData;
  const order = normalizePhoneSlots(data, isLib ? phoneOrderLib : phoneOrder);
  const currentPosition = order.indexOf(phone) + 1;
  const input = prompt(`请输入 ${phone} 的位置编号`, currentPosition || '');
  if (input === null) return;

  const targetPosition = parseInt(input.trim(), 10);
  if (!Number.isInteger(targetPosition) || targetPosition < 1) {
    showNotification('位置编号必须是大于0的数字', 'error');
    return;
  }

  const occupied = order[targetPosition - 1];
  if (occupied && occupied !== phone) {
    showNotification(`位置 ${targetPosition} 已有号码 ${occupied}`, 'error');
    return;
  }

  requirePasswordThen(async () => {
    const latestData = isLib ? mgmtDataLib : mgmtData;
    const latestOrder = normalizePhoneSlots(latestData, isLib ? phoneOrderLib : phoneOrder);
    const moved = setPhoneSlotPosition(latestData, latestOrder, phone, targetPosition);
    if (!moved) {
      showNotification(`位置 ${targetPosition} 已有号码`, 'error');
      return;
    }

    if (isLib) {
      phoneOrderLib = moved;
      saveMgmtDataLib();
      renderMgmtGridLib();
      await uploadFixedLib('自用库排序调整');
    } else {
      phoneOrder = moved;
      saveMgmtData();
      renderMgmtGrid();
      await uploadFixedMain('接码库排序调整');
    }
  });
};

buildPhoneCardHtml = function(phone, data, position, library) {
  const phoneDays = calculateRemainingDays(data.expiryTimestamp);
  const { winCount, remoteWinCount, macCount, minItemDays } = getPhoneCardStats(data);
  const badgeHtml = minItemDays !== Infinity && minItemDays <= 7 ? `<div class="mgmt-card-badge warning">${minItemDays}</div>` : '';
  const phoneDaysStyle = phoneDays <= 7 ? 'warning' : '';
  const phoneDaysText = phoneDays <= 7 ? `${phoneDays}<span style="color:red; font-weight:bold;">!</span>` : phoneDays;

  return `<div class="mgmt-card-position" data-library="${library}" data-phone="${phone}" onpointerdown="event.stopPropagation()" onclick="event.stopPropagation(); changePhonePosition(this.dataset.library, this.dataset.phone)">${position}</div><div class="mgmt-card-phone">${phone}</div><div class="mgmt-card-days-container"><div class="mgmt-card-days-box ${phoneDaysStyle}">${phoneDaysText}</div></div><div class="mgmt-card-stats" style="display:flex!important;align-items:center;gap:2px;font-size:10px;font-weight:bold;min-width:45px;justify-content:flex-end;"><span class="stat-win" style="color:#28a745!important;">${winCount}</span><span class="stat-sep" style="color:#999!important;">/</span><span class="stat-remote" style="color:#dc3545!important;">${remoteWinCount}</span><span class="stat-sep" style="color:#999!important;">/</span><span class="stat-mac" style="color:#000!important;">${macCount}</span></div>${badgeHtml}`;
};

function appendEmptySlotCard(grid, position) {
  const card = document.createElement('div');
  card.className = 'mgmt-card mgmt-card-empty';
  card.innerHTML = `<div class="mgmt-card-position">${position}</div><div class="empty-slot-label">空位</div>`;
  grid.appendChild(card);
}

function renderFixedGrid(library) {
  const isLib = library === 'lib';
  const grid = document.getElementById(isLib ? 'mgmtGridLib' : 'mgmtGrid');
  const dataMap = isLib ? mgmtDataLib : mgmtData;
  let order = normalizePhoneSlots(dataMap, isLib ? phoneOrderLib : phoneOrder);

  if (isLib) phoneOrderLib = order;
  else phoneOrder = order;

  grid.innerHTML = '';

  order.forEach((phone, slotIndex) => {
    const position = slotIndex + 1;

    if (!phone || !dataMap[phone]) {
      appendEmptySlotCard(grid, position);
      return;
    }

    const data = dataMap[phone];
    const expanded = isLib ? expandedPhoneLib : expandedPhone;
    const card = document.createElement('div');
    card.className = 'mgmt-card' + (phone === expanded ? ' active' : '');
    card.setAttribute('data-phone', phone);
    card.innerHTML = buildPhoneCardHtml(phone, data, position, isLib ? 'lib' : 'main');
    bindPhoneCardInteraction(card, isLib ? 'lib' : 'main', phone);
    grid.appendChild(card);

    if (expanded !== phone) return;

    const phoneArg = JSON.stringify(phone);
    const updateExpiryFn = isLib ? 'updatePhoneExpiryLib' : 'updatePhoneExpiry';
    const showFormFn = isLib ? 'showItemFormLib' : 'showItemForm';
    const deletePhoneFn = isLib ? 'deletePhoneLib' : 'deletePhone';
    const editFn = isLib ? 'editItemNicknameLib' : 'editItemNickname';
    const actionFn = isLib ? 'handleItemActionLib' : 'handleItemAction';
    const detailArea = document.createElement('div');

    detailArea.className = 'mgmt-detail-area active';
    detailArea.style.gridColumn = '1 / -1';

    let html = `
<div class="mgmt-detail-header">
<div class="mgmt-detail-title-wrap">
<span class="mgmt-detail-title">${phone}</span>
<div class="mgmt-detail-expiry" style="margin-left: 5px;">
<span>📅 ${calculateDate(dataMap[phone].expiryTimestamp)}</span>
<input type="date" class="mgmt-detail-expiry-input" value="${dateInputValue(dataMap[phone].expiryTimestamp)}" onchange="${updateExpiryFn}('${phone}', this.value)">
</div>
</div>
<div class="mgmt-detail-btns">
<button class="detail-action-btn" style="background:#28a745;" onclick="event.stopPropagation(); ${showFormFn}(${phoneArg})">添加</button>
<button class="detail-action-btn" style="background:#dc3545;" onclick="event.stopPropagation(); ${deletePhoneFn}(${phoneArg})">删除</button>
</div>
</div>
<table class="mgmt-detail-table">
<thead>
<tr><th class="col-nickname">昵称</th><th class="col-device">设备</th><th class="col-system">系统</th><th class="col-days">剩余天数</th><th class="col-date">到期日期</th><th class="col-action">操作</th></tr>
</thead>
<tbody>
`;

    const sortedItems = sortDetailItems(dataMap[phone].items || []);
    sortedItems.forEach((item, displayIdx) => {
      const itemDate = calculateDate(item.expiryTimestamp);
      const isRemote = item.system === 'Win' && (item.isRemote || item.remote);
      const remoteBadge = isRemote ? '<span class="remote-badge">远</span>' : '';
      const nicknameDisplay = `${remoteBadge}${displayIdx + 1}. ${item.nickname || '-'}`;
      const rowClass = item.deleted ? 'item-deleted' : '';
      const actionBtn = item.deleted
        ? `<button class="mgmt-btn" onclick="${actionFn}('${phone}', ${item.originalIdx}, 'restore')" style="padding:1px 2px; font-size:9px; background:#fff; color:#28a745; border:1px solid #28a745; border-radius:2px; cursor:pointer; width:100%; height:16px;">恢复</button>`
        : `<button class="mgmt-btn" onclick="${actionFn}('${phone}', ${item.originalIdx}, 'fail')" style="padding:1px 2px; font-size:9px; background:#fff; color:#dc3545; border:1px solid #dc3545; border-radius:2px; cursor:pointer; width:100%; height:16px;">失效</button>`;

      html += `
<tr class="${rowClass}">
<td class="col-nickname"><span style="cursor:pointer;" onclick="${editFn}('${phone}', ${item.originalIdx})">${nicknameDisplay}</span></td>
<td class="col-device">${item.device || '-'}</td>
<td>${item.system === 'Win' ? `<span style="color: #28a745; font-weight: bold;">${isRemote ? '远程' : 'Win'}</span>` : item.system}</td>
<td>${item.days <= 7 ? `<span style="color:red; font-weight:bold;">${item.days}天<span style="color:red; font-weight:bold;">!</span></span>` : `${item.days}天`}</td>
<td>${itemDate}</td>
<td style="text-align:center;">${actionBtn}</td>
</tr>
`;
    });

    html += `</tbody></table>`;
    detailArea.innerHTML = html;
    grid.appendChild(detailArea);
  });

  document.getElementById(isLib ? 'libTotalPhones' : 'mgmtTotalPhones').innerText = Object.keys(dataMap).length;

  let totalExpiringItems = 0;
  Object.keys(dataMap).forEach(phone => {
    (dataMap[phone].items || []).forEach(it => {
      if (!it.deleted && calculateRemainingDays(it.expiryTimestamp) <= 7) totalExpiringItems++;
    });
  });
  document.getElementById(isLib ? 'libExpiringCount' : 'mgmtExpiringCount').innerText = totalExpiringItems;

  if (isLib) updateSummaryLib();
  else if (typeof updateSummary === 'function') updateSummary();
}

renderMgmtGrid = function() {
  renderFixedGrid('main');
};

renderMgmtGridLib = function() {
  renderFixedGrid('lib');
};

loadMgmtData = function() {
  const saved = localStorage.getItem("sms_mgmt_data");
  if (saved) {
    const parsed = JSON.parse(saved);
    mgmtData = parsed.mgmt || parsed.mgmtData || parsed;
    phoneOrder = normalizePhoneSlots(mgmtData, parsed.order || parsed.phoneOrder || Object.keys(mgmtData));
  }
};

loadMgmtDataLib = function() {
  const saved = localStorage.getItem('mgmtDataLib');
  if (saved) {
    mgmtDataLib = JSON.parse(saved);
    phoneOrderLib = normalizePhoneSlots(
      mgmtDataLib,
      localStorage.getItem('phoneOrderLib') ? JSON.parse(localStorage.getItem('phoneOrderLib')) : Object.keys(mgmtDataLib)
    );
  }
};

addPhoneToMgmt = function(phone) {
  if (!mgmtData[phone]) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    mgmtData[phone] = { items: [], expiryTimestamp: today.getTime() };
    phoneOrder = appendPhoneToLastSlot(phoneOrder, phone);
    saveMgmtData();
    renderMgmtGrid();
  }
};

addPhoneFromInput = function() {
  const phone = prompt('请输入手机号码:');
  if (!phone) return;
  const trimmedPhone = phone.trim();
  if (!trimmedPhone) return showNotification('号码不能为空', 'error');

  if (mgmtData[trimmedPhone]) {
    showNotification(`号码 ${trimmedPhone} 已存在于接码库`, 'success');
    return;
  }

  requirePasswordThen(async () => {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    mgmtData[trimmedPhone] = { items: [], expiryTimestamp: today.getTime() };
    phoneOrder = appendPhoneToLastSlot(phoneOrder, trimmedPhone);
    saveMgmtData();
    renderMgmtGrid();
    await uploadFixedMain('添加手机数据');
    showNotification(`号码 ${trimmedPhone} 已添加到接码库`, 'success');
  });
};

deletePhone = function(phone) {
  if (confirm(`确定删除号码 ${phone} 吗？`)) {
    requirePasswordThen(async () => {
      phoneOrder = removePhoneFromSlot(phoneOrder, phone);
      delete mgmtData[phone];
      saveMgmtData();
      renderMgmtGrid();
      await uploadFixedMain('删除手机数据');
    });
  }
};

deletePhoneLib = function(phone) {
  if (confirm(`确定删除号码 ${phone} 吗？`)) {

    });

downloadFromGist = async function() {
  requirePasswordThen(async () => {
    try {
      saveLocalBackup('main', '云端下载覆盖前');
      const response = await fetch(`https://api.github.com/gists/${GITHUB_CONFIG.gistId}`, {
        headers: { 'Authorization': `Bearer ${GITHUB_CONFIG.token}`, 'Accept': 'application/vnd.github+json' }
      });
      if (!response.ok) throw new Error('获取数据失败');
      const gistData = await response.json();
      const file = gistData.files[GITHUB_CONFIG.fileName];
      if (!file || !file.content) throw new Error('云端未找到备份文件');
      if (!file.content || file.content.trim() === '' || file.content.trim() === '{}') {
        mgmtData = {};
        phoneOrder = [];
      } else {
        const imported = JSON.parse(file.content);
        mgmtData = imported.mgmtData || imported.mgmtDataLib || imported;
        phoneOrder = normalizePhoneSlots(mgmtData, imported.phoneOrder || imported.phoneOrderLib || Object.keys(mgmtData));
      }
      saveMgmtData();
      renderMgmtGrid();
      showNotification('下载成功，覆盖前本地已备份！', 'success');
    } catch (err) {
      showNotification('下载出错: ' + err.message, 'error');
    }
  });
};
