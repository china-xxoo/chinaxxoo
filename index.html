<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#050505" />
    <title>欢迎来到花花世界！</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --panel: rgba(10, 10, 12, 0.7);
        --ink: #ffffff;
        --muted: rgba(255, 255, 255, 0.68);
        --line: rgba(255, 255, 255, 0.18);
        --hot: #ff4fd8;
        --ice: #56e8ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        overflow-x: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      .login-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.42)),
          url("assets/login-bg.jpg") center center / cover no-repeat;
        transform: scale(1.02);
      }

      .login-bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, transparent 45%, rgba(0, 0, 0, 0.66));
      }

      .gate,
      .app {
        position: relative;
        z-index: 1;
      }

      .gate,
      .app {
        min-height: 100svh;
        display: grid;
        grid-template-rows: 1fr auto;
        padding:
          max(18px, env(safe-area-inset-top))
          18px
          max(22px, env(safe-area-inset-bottom));
      }

      .login-title {
        align-self: center;
        margin: 0 auto;
        width: min(100%, 360px);
        text-align: center;
        color: rgba(255, 255, 255, 0.5);
        font-size: clamp(40px, 11vw, 48px);
        line-height: 1.15;
        letter-spacing: 0;
        text-shadow: 0 8px 28px rgba(0, 0, 0, 0.55);
      }

      .gate-panel {
        width: min(100%, 360px);
        margin: 0 auto;
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 22px;
        background: rgba(5, 5, 8, 0.54);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        padding: 16px;
      }

      .gate-label {
        display: block;
        margin-bottom: 9px;
        color: rgba(255, 255, 255, 0.78);
        font-size: 14px;
      }

      .gate-row {
        display: grid;
        grid-template-columns: 1fr 72px;
        gap: 8px;
      }

      .gate-input {
        min-width: 0;
        height: 46px;
        border: 1px solid rgba(255, 255, 255, 0.28);
        border-radius: 15px;
        padding: 0 13px;
        outline: none;
        background: rgba(0, 0, 0, 0.42);
        color: var(--ink);
        font: inherit;
      }

      .gate-input:focus {
        border-color: rgba(255, 79, 216, 0.82);
        box-shadow: 0 0 0 3px rgba(255, 79, 216, 0.18);
      }

      .gate-button {
        height: 46px;
        border: 0;
        border-radius: 15px;
        background: linear-gradient(135deg, var(--ice), var(--hot));
        color: #08070b;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
      }

      .gate-error {
        min-height: 20px;
        margin: 10px 0 0;
        color: #ffd2f6;
        font-size: 14px;
      }

      .welcome-toast {
        position: fixed;
        left: 50%;
        top: 50%;
        z-index: 5;
        transform: translate(-50%, -50%) scale(0.94);
        opacity: 0;
        pointer-events: none;
        border: 1px solid rgba(255, 255, 255, 0.34);
        border-radius: 22px;
        background: rgba(0, 0, 0, 0.58);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.54);
        color: #fff;
        padding: 16px 22px;
        font-size: 21px;
        font-weight: 800;
        letter-spacing: 0;
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        transition:
          opacity 220ms ease,
          transform 220ms ease;
      }

      .welcome-toast.show {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }

      body:not(.locked) .gate {
        display: none;
      }

      body.locked .app {
        display: none;
      }

      .app {
        width: 100%;
      }

      .shot-panel {
        width: min(100%, 360px);
        margin: 0 auto;
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 22px;
        background: rgba(5, 5, 8, 0.54);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        padding: 12px;
      }

      .latest-shot {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 14px;
        background: rgba(0, 0, 0, 0.5);
        cursor: pointer;
        padding: 0;
      }

      .latest-shot:disabled {
        cursor: default;
      }

      .latest-shot img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .latest-empty {
        display: grid;
        place-items: center;
        width: 100%;
        height: 100%;
        color: rgba(255, 255, 255, 0.72);
        font-size: 14px;
      }

      .thumb-row {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 7px;
        margin-top: 10px;
      }

      .thumb {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 9px;
        background: rgba(0, 0, 0, 0.48);
        cursor: pointer;
        padding: 0;
      }

      .thumb:disabled {
        cursor: default;
        opacity: 0.46;
      }

      .thumb img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .lightbox {
        position: fixed;
        inset: 0;
        z-index: 6;
        display: grid;
        place-items: center;
        padding: max(18px, env(safe-area-inset-top)) 16px max(18px, env(safe-area-inset-bottom));
        background: rgba(0, 0, 0, 0.78);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .lightbox[hidden] {
        display: none;
      }

      .lightbox img {
        display: block;
        width: min(94vw, 860px);
        max-height: 78svh;
        border: 1px solid rgba(255, 255, 255, 0.26);
        border-radius: 18px;
        box-shadow: 0 24px 90px rgba(0, 0, 0, 0.72);
        object-fit: contain;
      }

      .lightbox-close {
        position: fixed;
        top: max(15px, env(safe-area-inset-top));
        right: 15px;
        width: 42px;
        height: 42px;
        border: 1px solid rgba(255, 255, 255, 0.28);
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.54);
        color: #fff;
        cursor: pointer;
        font-size: 28px;
        line-height: 1;
      }
    </style>
  </head>
  <body class="locked">
    <div class="login-bg" aria-hidden="true"></div>

    <section class="gate" id="authGate" aria-label="密码验证">
      <h1 class="login-title">欢迎来到<br />花花世界！</h1>
      <form class="gate-panel" id="authForm">
        <label class="gate-label" for="passwordInput">请输入6位密码</label>
        <div class="gate-row">
          <input
            class="gate-input"
            id="passwordInput"
            name="password"
            type="password"
            inputmode="numeric"
            maxlength="6"
            autocomplete="off"
            autofocus
          />
          <button class="gate-button" type="submit">进入</button>
        </div>
        <p class="gate-error" id="authError" aria-live="polite"></p>
      </form>
    </section>

    <div class="welcome-toast" id="welcomeToast" role="status" aria-live="polite">欢迎赵公子！</div>

    <main class="app">
      <h1 class="login-title">欢迎来到<br />花花世界！</h1>

      <section class="shot-panel" aria-label="直播截图">
        <button class="latest-shot" id="latestShot" type="button" disabled>
          <span class="latest-empty">等待云端截图</span>
        </button>
        <div class="thumb-row" id="thumbRow"></div>
      </section>
    </main>

    <div class="lightbox" id="lightbox" hidden>
      <button class="lightbox-close" id="lightboxClose" type="button" aria-label="关闭">×</button>
      <img id="lightboxImage" alt="放大的直播截图" />
    </div>

    <script>
      const correctPassword = "1";
      const thumbCount = 20;
      let forcedErrorShown = false;
      let imageBase = "";
      const manifestCandidates = [
        { manifest: `manifest.json?t=${Date.now()}`, base: "" },
        {
          manifest: `https://raw.githubusercontent.com/china-xxoo/chinaxxoo/main/manifest.json?t=${Date.now()}`,
          base: "https://raw.githubusercontent.com/china-xxoo/chinaxxoo/main/",
        },
      ];

      const authForm = document.getElementById("authForm");
      const authError = document.getElementById("authError");
      const passwordInput = document.getElementById("passwordInput");
      const welcomeToast = document.getElementById("welcomeToast");
      const latestShot = document.getElementById("latestShot");
      const thumbRow = document.getElementById("thumbRow");
      const lightbox = document.getElementById("lightbox");
      const lightboxImage = document.getElementById("lightboxImage");
      const lightboxClose = document.getElementById("lightboxClose");

      function unlock() {
        document.body.classList.remove("locked");
        loadPage();
      }

      function showWelcomeThenUnlock() {
        welcomeToast.classList.add("show");
        setTimeout(() => {
          unlock();
          welcomeToast.classList.remove("show");
        }, 1400);
      }

      function imageUrl(file) {
        return `${imageBase}${file}?t=${Date.now()}`;
      }

      function openLightbox(src) {
        lightboxImage.src = src;
        lightbox.hidden = false;
      }

      function closeLightbox() {
        lightbox.hidden = true;
        lightboxImage.removeAttribute("src");
      }

      function renderLatest(latest) {
        latestShot.innerHTML = "";
        if (!latest) {
          latestShot.disabled = true;
          const empty = document.createElement("span");
          empty.className = "latest-empty";
          empty.textContent = "等待云端截图";
          latestShot.append(empty);
          return;
        }

        const src = imageUrl(latest.file);
        const image = document.createElement("img");
        image.src = src;
        image.alt = "最新直播截图";
        latestShot.disabled = false;
        latestShot.onclick = () => openLightbox(src);
        latestShot.append(image);
      }

      function renderThumbs(snapshots) {
        thumbRow.innerHTML = "";
        for (let index = 0; index < thumbCount; index += 1) {
          const shot = snapshots[index];
          const button = document.createElement("button");
          button.className = "thumb";
          button.type = "button";

          if (shot && shot.file) {
            const src = imageUrl(shot.file);
            const image = document.createElement("img");
            image.src = src;
            image.alt = "直播截图缩略图";
            button.addEventListener("click", () => openLightbox(src));
            button.append(image);
          } else {
            button.disabled = true;
          }

          thumbRow.append(button);
        }
      }

      async function loadManifest() {
        for (const candidate of manifestCandidates) {
          const response = await fetch(candidate.manifest, { cache: "no-store" }).catch(() => null);
          if (response && response.ok) {
            imageBase = candidate.base;
            return response.json();
          }
        }
        throw new Error("manifest load failed");
      }

      function loadPage() {
        loadManifest()
          .then((manifest) => {
            renderLatest(manifest.latest);
            renderThumbs((manifest.snapshots || manifest.streams || []).slice(0, thumbCount));
          })
          .catch(() => {
            renderLatest(null);
            renderThumbs([]);
          });
      }

      lightboxClose.addEventListener("click", closeLightbox);
      lightbox.addEventListener("click", (event) => {
        if (event.target === lightbox) {
          closeLightbox();
        }
      });
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !lightbox.hidden) {
          closeLightbox();
        }
      });

      authForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const value = passwordInput.value.trim();

        if (!forcedErrorShown) {
          forcedErrorShown = true;
          authError.textContent = "密码错误";
          passwordInput.value = "";
          passwordInput.focus();
          return;
        }

        if (value === correctPassword) {
          authError.textContent = "";
          showWelcomeThenUnlock();
          return;
        }

        authError.textContent = "密码错误";
        passwordInput.value = "";
        passwordInput.focus();
      });

      passwordInput.focus();
    </script>
  </body>
</html>
