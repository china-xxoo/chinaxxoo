name: YouTube Live Snapshot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: youtube-live-snapshot
  cancel-in-progress: false

env:
  YOUTUBE_URL: "https://www.youtube.com/watch?v=FS7IPxmfEms"
  YOUTUBE_VIDEO_ID: "FS7IPxmfEms"
  MAX_SNAPSHOTS: "10"
  SITE_TIMEZONE: "Asia/Shanghai"

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare GitHub Pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin gh-pages; then
            git clone --depth=1 --branch gh-pages "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" site
          else
            mkdir site
            cd site
            git init
            git checkout --orphan gh-pages
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          fi

      - name: Capture one frame
        run: |
          set -euxo pipefail
          mkdir -p tmp
          for name in maxresdefault_live hqdefault_live maxresdefault hqdefault; do
            if curl --fail --location --silent --show-error \
              "https://img.youtube.com/vi/${YOUTUBE_VIDEO_ID}/${name}.jpg" \
              --output tmp/snapshot.jpg; then
              break
            fi
          done

          test -s tmp/snapshot.jpg

      - name: Update static site
        run: |
          set -euxo pipefail
          captured_at="$(TZ="$SITE_TIMEZONE" date -Iseconds)"
          python3 scripts/update_site.py \
            --site site \
            --public public \
            --snapshot tmp/snapshot.jpg \
            --captured-at "$captured_at" \
            --source-url "$YOUTUBE_URL" \
            --max-snapshots "$MAX_SNAPSHOTS"

      - name: Publish to gh-pages
        run: |
          set -euxo pipefail
          cd site
          git add .
          if git diff --cached --quiet; then
            echo "No page changes to publish."
            exit 0
          fi
          git commit -m "Update live snapshot"
          git push origin gh-pages
