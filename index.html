<html lang="zh-CN">

<title>木木接码 - V14.8 边距优化版</title>
<style>
  /* 新增验证页面样式 */
  .auth-lock-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #f0f2f5;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 99999;
    padding: 20px;
  }
  .auth-card {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    width: 100%;
    max-width: 350px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  .auth-title {
    font-size: 18px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 20px;
    color: #333;
  }
  .auth-input {
    width: 100%;
    height: 44px;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 0 12px;
    font-size: 16px;
    margin-bottom: 12px;
    outline: none;
  }
  .auth-input:focus {
    border-color: #007bff;
  }
  .auth-btn {
    width: 100%;
    height: 44px;
    border: none;
    border-radius: 8px;
    background: #007bff;
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 8px;
  }
  .auth-btn:disabled {
    background: #6c757d;
    cursor: not-allowed;
  }
  .auth-error {
    color: #dc3545;
    font-size: 12px;
    text-align: center;
    margin-top: 8px;
    min-height: 16px;
  }
  .auth-tip {
    color: #888;
    font-size: 11px;
    text-align: center;
    margin-top: 16px;
  }

  /* 原有样式 */
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
  body { background: #f0f2f5; padding: 8px 32px; max-width: 450px; margin: 0 auto; color: #333; font-size: 14px; }
  .container { background: #fff; border-radius: 8px; padding: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); position: relative; z-index: 1; }
  
  .flex-row { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; position: relative; z-index: 2; }
  button { height: 36px; border-radius: 4px; font-weight: bold; cursor: pointer; border: 1px solid #ccc; background: #fff; transition: background 0.2s; font-size: 14px; position: relative; z-index: 3; }
  button:active { background: #f0f0f0; }
  .btn-main { flex: 1; }
  
  .top-header-custom { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; position: relative; z-index: 2; }
  .display-box-custom { flex: 1; height: 40px; border: 1px solid #ccc; border-radius: 4px; background: #f8f9fa; cursor: pointer; display: flex; align-items: center; justify-content: flex-start; margin-right: 8px; padding-left: 8px; }
  .display-box-custom input { width: 100%; height: 100%; border: none; background: transparent; text-align: left; font-weight: bold; font-size: 18px; outline: none; }
  .status-stack-custom { display: flex; flex-direction: column; align-items: flex-end; font-size: 12px; min-width: 80px; }
  .status-stack-custom #currentTime { color:#007bff; font-weight:bold; line-height: 1.1; }
  .status-stack-custom #balanceText { color:#28a745; font-weight:bold; line-height: 1.1; }

  .code-info-row { display: flex; gap: 6px; margin-bottom: 8px; height: 40px; position: relative; z-index: 2; }
  .code-box { flex: 1; height: 100%; line-height: 36px; background: #e7f3ff; border: 2px dashed #007bff; border-radius: 6px; text-align: center; font-size: 16px; font-weight: 800; color: #007bff; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .info-box { flex: 2; height: 100%; background: #f8f9fa; border: 1px solid #eee; border-radius: 6px; padding: 2px 6px; font-size: 11px; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
  .info-item { display: flex; align-items: flex-start; line-height: 1.1; }
  .info-label { color: #888; flex-shrink: 0; width: 32px; }
  .info-value { color: #333; word-break: break-all; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .share-section { margin-top: 8px; margin-bottom: 8px; display: flex; flex-direction: column; gap: 6px; position: relative; z-index: 2; }
  .share-box { width: 100%; border-radius: 6px; padding: 6px; min-height: 44px; font-size: 12px; cursor: pointer; position: relative; transition: all 0.2s; border: 1px solid transparent; display: flex; flex-direction: column; justify-content: center; }
  .share-box:active { opacity: 0.8; transform: scale(0.99); }
  .share-box::after { content: "复制"; position: absolute; bottom: 2px; right: 4px; font-size: 8px; opacity: 0.5; }
  
  #shareBoxA { background: #e7f5ff; border-color: #74c0fc; color: #1971c2; }
  #shareBoxB { background: #fff4e6; border-color: #ffd8a8; color: #d9480f; }
  
  .share-placeholder { color: #adb5bd; font-style: italic; text-align: center; width: 100%; }

  .mgmt-section { margin-top: 8px; padding-top: 6px; border-top: 1px solid #eee; position: relative; z-index: 2; }
  .mgmt-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; cursor: pointer; padding: 2px 0; }
  .mgmt-title { font-size: 14px; font-weight: bold; color: #333; display: flex; align-items: center; gap: 4px; }
  .mgmt-title::after { content: "▼"; font-size: 10px; color: #999; transition: transform 0.3s; }
  .mgmt-section.expanded .mgmt-title::after { transform: rotate(180deg); }
  
  .mgmt-actions { display: flex; gap: 4px; }
  .mgmt-action-btn { font-size: 10px; padding: 0 6px; height: 18px; line-height: 16px; border: 1px solid #007bff; color: #007bff; background: #fff; border-radius: 3px; cursor: pointer; }

  .mgmt-grid { display: none; grid-template-columns: repeat(2, 1fr); column-gap: 6px; row-gap: 6px; padding: 0; width: 100%; animation: fadeIn 0.2s; }
  .mgmt-section.expanded .mgmt-grid { display: grid; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }

  .mgmt-card { 
    background: #f9f9f9; border: 1px solid #ddd; border-radius: 4px; height: 34px; padding: 0 6px; 
    cursor: grab; transition: all 0.2s; display: flex; align-items: center; justify-content: center; 
    overflow: hidden; position: relative; user-select: none; touch-action: none;
  }
  .mgmt-card:active { cursor: grabbing; background: #f0f0f0; }
  .mgmt-card.dragging { opacity: 0.5; border: 1px dashed #007bff; transform: scale(1.02); z-index: 100; }
  .mgmt-card-phone { font-weight: bold; font-size: 13px; color: #007bff; pointer-events: none; }
  
  .long-press-hint { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); font-size: 8px; color: #dc3545; display: none; }
  .mgmt-card.pressing .long-press-hint { display: block; }

  .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.5); display: none; justify-content: center; align-items: center; z-index: 9999; }
  .modal-body { background: #fff; border-radius: 8px; width: 92%; max-width: 380px; padding: 12px; max-height: 90vh; overflow-y: auto; position: relative; }
  
  .config-section { margin-bottom: 6px; border: 1px solid #eee; border-radius: 6px; overflow: hidden; }
  .config-section-header { background: #f8f9fa; padding: 8px 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 13px; border-bottom: 1px solid transparent; }
  .config-section-header::after { content: "▼"; font-size: 8px; color: #999; transition: transform 0.3s; }
  .config-section.active .config-section-header { border-bottom-color: #eee; }
  .config-section.active .config-section-header::after { transform: rotate(180deg); }
  .config-section-content { display: none; padding: 8px 10px; background: #fff; }
  .config-section.active .config-section-content { display: block; }
  
  .config-panel label { display: block; font-size: 11px; color: #666; margin-bottom: 2px; margin-top: 6px; }
  .config-panel label:first-child { margin-top: 0; }
  .config-panel input, .config-panel select, .config-panel textarea { width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; outline: none; background: #fff; }
  .config-panel textarea { resize: vertical; min-height: 60px; font-size: 11px; line-height: 1.3; }
  
  .config-pinned { background: #fff; border: 1px solid #007bff; border-radius: 6px; padding: 8px 10px; margin-bottom: 10px; }

  /* 弹窗底部按钮排列优化：一行两个 */
  .modal-footer-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 15px; }
</style>
</head>
<body>
<!-- 新增验证界面 -->
<div class="auth-lock-screen" id="authLockScreen">
  <div class="auth-card">

<!-- 原有内容 -->
<div class="container" id="mainContainer" style="display: none;">
  <div class="top-header-custom">

<div class="modal" id="authModal" onclick="if(event.target.id === 'authModal') closeAuthModal()">

    <div class="modal-footer-grid">

</div>

<script>
// ========== 新增验证配置 ==========
const DEFAULT_ACCESS_CONFIG = {
  accessPass: "your_default_password", // 默认访问密码（请立即修改）
  allowPhones: "13800138000", // 默认允许的手机号（请替换为你的手机号）
  failCount: 0, // 验证失败次数
  lockTime: 0, // 锁定时间戳
  lockDuration: 5 * 60 * 1000, // 锁定时长（5分钟）
  maxFailCount: 3 // 最大失败次数
};

// 初始化访问配置
let accessConfig = JSON.parse(localStorage.getItem("sms_access_config")) || DEFAULT_ACCESS_CONFIG;

// ========== 原有配置 ==========
const DEFAULT_TPL_A = "号码：[手机号] 请验证码登录，发送验证码之后请给我说一下，验证码5分钟有效，不用催，如果有问题，我会告诉你。";
const DEFAULT_TPL_B = "老铁！登录后请及时确认收货# [验证码]";

let currentConfig = {
  server: "api.haozhuma.com",
  sid: "80614",
  user: "47b19c972cdfb164540c49a7a525a3495bd799ce9cd9f055ee0e01c89f7476ec",
  pass: "c050de8665665e1369e58702c8c970c182b41d1a7e6d2c8a9151c15e727922d1",
  token: "",
  loginUser: "wei2424225995",
  loginPass: "wei376582706",
  authPass: "123456",
  tplA: DEFAULT_TPL_A,
  tplB: DEFAULT_TPL_B,
  accessPass: accessConfig.accessPass,
  allowPhones: accessConfig.allowPhones
};

let mgmtData = {};
let phoneOrder = [];
let pollTimer = null;
let currentPhone = "";

// ========== 新增验证函数 ==========
function checkAuthLock() {
  // 检查是否被锁定
  if (accessConfig.lockTime > Date.now()) {
    const remainTime = Math.ceil((accessConfig.lockTime - Date.now()) / 60000);
    showAuthError(`验证失败次数过多，已锁定${remainTime}分钟`);
    document.getElementById("authSubmitBtn").disabled = true;
    return true;
  }
  // 重置锁定状态
  accessConfig.failCount = 0;
  accessConfig.lockTime = 0;
  saveAccessConfig();
  return false;
}

function verifyAccessAuth() {
  // 检查锁定状态
  if (checkAuthLock()) return;

  const inputPass = document.getElementById("authAccessPass").value.trim();
  const inputPhone = document.getElementById("authUserPhone").value.trim().replace(/\s/g, "");
  
  // 验证输入
  if (!inputPass || !inputPhone) {
    showAuthError("请输入完整的验证信息");
    return;
  }

  // 获取允许的手机号列表
  const allowPhones = (currentConfig.allowPhones || accessConfig.allowPhones).split(",").map(phone => phone.trim());
  
  // 验证密码和手机号
  if (inputPass === (currentConfig.accessPass || accessConfig.accessPass) && allowPhones.includes(inputPhone)) {
    // 验证通过
    localStorage.setItem("sms_auth_status", "verified");
    document.getElementById("authLockScreen").style.display = "none";
    document.getElementById("mainContainer").style.display = "block";
    // 初始化主程序
    initMainApp();
  } else {
    // 验证失败
    accessConfig.failCount++;
    showAuthError(`验证失败（${accessConfig.failCount}/${DEFAULT_ACCESS_CONFIG.maxFailCount}）`);
    
    // 达到最大失败次数，锁定
    if (accessConfig.failCount >= DEFAULT_ACCESS_CONFIG.maxFailCount) {
      accessConfig.lockTime = Date.now() + DEFAULT_ACCESS_CONFIG.lockDuration;
      showAuthError(`验证失败次数过多，已锁定5分钟`);
      document.getElementById("authSubmitBtn").disabled = true;
    }
    saveAccessConfig();
  }
}

function showAuthError(text) {
  document.getElementById("authErrorText").innerText = text;
  // 3秒后清空错误提示
  setTimeout(() => {
    if (document.getElementById("authErrorText").innerText === text) {
      document.getElementById("authErrorText").innerText = "";
    }
  }, 3000);
}

function saveAccessConfig() {
  localStorage.setItem("sms_access_config", JSON.stringify(accessConfig));
}

// ========== 初始化函数 ==========
async function initMainApp() {
  const savedConfig = localStorage.getItem("sms_stable_config");
  if (savedConfig) {
    const parsed = JSON.parse(savedConfig);
    currentConfig = { ...currentConfig, ...parsed };
    // 同步访问配置
    accessConfig.accessPass = currentConfig.accessPass || accessConfig.accessPass;
    accessConfig.allowPhones = currentConfig.allowPhones || accessConfig.allowPhones;
    saveAccessConfig();
  }
  loadMgmtData();
  renderMgmtGrid();
  setInterval(() => {
    const now = new Date();
    document.getElementById("currentTime").innerText = now.toTimeString().split(' ')[0];
  }, 1000);
  await silentLogin();
  getBalance();
}

// ========== 页面加载时验证 ==========
window.onload = () => {
  // 检查是否已验证过（有效期24小时）
  const authStatus = localStorage.getItem("sms_auth_status");
  const authTime = localStorage.getItem("sms_auth_time");
  const now = Date.now();
  
  if (authStatus === "verified" && authTime && (now - parseInt(authTime)) < 24 * 60 * 60 * 1000) {
    // 24小时内已验证，直接进入
    document.getElementById("authLockScreen").style.display = "none";
    document.getElementById("mainContainer").style.display = "block";
    initMainApp();
  } else {
    // 需要重新验证
    localStorage.removeItem("sms_auth_status");
    checkAuthLock();
  }
};

// ========== 原有函数 ==========
async function silentLogin() {
  if (!currentConfig.user || !currentConfig.pass) return;
  const url = `https://${currentConfig.server}/sms/?api=login&user=${encodeURIComponent(currentConfig.user)}&pass=${encodeURIComponent(currentConfig.pass)}`;
  try {
    const res = await (await fetch(url)).json();
    if (res.code == 0 && res.token) {
      currentConfig.token = res.token;
      localStorage.setItem("sms_stable_config", JSON.stringify(currentConfig));
      return true;
    }
  } catch (err) { }
  return false;
}

async function apiCall(apiName, params = {}) {
  if (!currentConfig.token) await silentLogin();
  if (!currentConfig.token) return { code: -1, msg: "未检测到令牌(Token)" };
  let url = `https://${currentConfig.server}/sms/?api=${apiName}&token=${currentConfig.token}&sid=${currentConfig.sid}`;
  for (let key in params) { url += `&${key}=${encodeURIComponent(params[key])}`; }
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.msg && (data.msg.includes("token") || data.msg.includes("令牌") || data.msg.includes("登录"))) {
       if (await silentLogin()) {
           url = `https://${currentConfig.server}/sms/?api=${apiName}&token=${currentConfig.token}&sid=${currentConfig.sid}`;
           for (let key in params) { url += `&${key}=${encodeURIComponent(params[key])}`; }
           const retryRes = await fetch(url);
           return await retryRes.json();
       }
    }
    return data;
  } catch (err) { return { code: -1, msg: "网络异常" }; }
}

async function getBalance() {
  const res = await apiCall("getSummary");
  const el = document.getElementById("balanceText");
  if (el) {
    el.innerText = (res.code == 0 && res.money !== undefined) ? `余额：${res.money}元` : "余额：获取失败";
  }
}

async function getPhone() {
  stopPolling();
  document.getElementById("inputPhone").value = "获取中...";
  const res = await apiCall("getPhone");
  if (res.code == 0 && res.phone) {
    handlePhoneSuccess(res.phone);
    autoCopy(res.phone);
  } else {
    document.getElementById("inputPhone").value = "获取失败";
    alert("获取失败: " + (res.msg || "未知错误"));
  }
}

async function getSpecPhone() {
  const phone = document.getElementById("inputPhone").value.trim();
  if (!phone) return alert("请输入号码");
  stopPolling();
  document.getElementById("inputPhone").value = "指定中...";
  const res = await apiCall("getPhone", { phone: phone });
  if (res.code == 0) {
    handlePhoneSuccess(phone);
  } else {
    document.getElementById("inputPhone").value = "指定失败";
    alert("指定失败: " + (res.msg || "未知错误"));
  }
}

function handlePhoneSuccess(phone) {
  addPhoneToMgmt(phone);
  currentPhone = phone;
  document.getElementById("inputPhone").value = phone;
  updateShareA(phone);
  startPolling();
}

function stopPolling() { if (pollTimer) clearInterval(pollTimer); }

function startPolling() {
  stopPolling();
  document.getElementById("codeShow").innerText = "听码中...";
  document.getElementById("smsContent").innerText = "等待短信...";
  updateShareB("");
  pollTimer = setInterval(async () => {
    const res = await apiCall("getMessage", { phone: currentPhone });
    if (res.code == 0) {
      stopPolling();
      document.getElementById("codeShow").innerText = res.yzm || "已收码";
      document.getElementById("smsContent").innerText = res.sms || "无内容";
      updateShareB(res.yzm || "");
      autoCopy(res.yzm || "");
    }
  }, 5000);
}

async function releasePhone() {
  const phoneInInput = document.getElementById("inputPhone").value.trim();
  const phoneToRelease = currentPhone || phoneInInput;
  if (phoneToRelease && !phoneToRelease.includes("获") && !phoneToRelease.includes("失")) {
    await apiCall("cancelRecv", { phone: phoneToRelease });
    apiCall("addBlacklist", { phone: phoneToRelease });
  }
  stopPolling();
  currentPhone = "";
  document.getElementById("inputPhone").value = "";
  document.getElementById("codeShow").innerText = "等待获取";
  document.getElementById("smsContent").innerText = "已释放并拉黑";
  getBalance();
}

function updateShareA(phone) {
  const tpl = currentConfig.tplA || DEFAULT_TPL_A;
  const content = tpl.replace("[手机号]", phone);
  const box = document.getElementById("shareBoxA");
  box.innerText = content;
  box.classList.remove("share-placeholder");
}

function updateShareB(code) {
  const box = document.getElementById("shareBoxB");
  if (!code) {
    box.innerHTML = '<div class="share-placeholder">收码后自动生成内容B</div>';
    return;
  }
  const tpl = currentConfig.tplB || DEFAULT_TPL_B;
  const content = tpl.replace("[验证码]", code);
  box.innerText = content;
}

function copyShareContent(id) {
  const box = document.getElementById(id);
  if (box.querySelector(".share-placeholder")) return;
  const text = box.innerText;
  autoCopy(text);
  const originalText = text;
  box.innerText = "✅ 已复制";
  setTimeout(() => { box.innerText = originalText; }, 800);
}

function autoCopy(text) {
  if (!text) return;
  const textArea = document.createElement("textarea");
  textArea.value = text;
  document.body.appendChild(textArea);
  textArea.select();
  try { document.execCommand('copy'); } catch (err) {}
  document.body.removeChild(textArea);
}

function copyText(id) { autoCopy(document.getElementById(id).innerText); }

function toggleMgmtSection() { document.getElementById("mgmtSection").classList.toggle("expanded"); }

function renderMgmtGrid() {
  const grid = document.getElementById('mgmtGrid');
  grid.innerHTML = '';
  phoneOrder.forEach((phone, index) => {
    const card = document.createElement('div');
    card.className = 'mgmt-card';
    card.dataset.phone = phone;
    card.innerHTML = `<span class="mgmt-card-phone">${phone}</span><div class="long-press-hint">松开删除</div>`;
    card.onclick = () => {
      document.getElementById("inputPhone").value = phone;
      handlePhoneSuccess(phone);
    };
    let pressTimer;
    card.ontouchstart = (e) => {
      pressTimer = setTimeout(() => {
        card.classList.add('pressing');
        if(confirm(`确定删除号码 ${phone} 吗？`)) deletePhone(phone);
        card.classList.remove('pressing');
      }, 800);
    };
    card.ontouchend = () => { clearTimeout(pressTimer); card.classList.remove('pressing'); };
    card.draggable = true;
    card.ondragstart = (e) => { card.classList.add('dragging'); e.dataTransfer.setData('text/plain', index); };
    card.ondragend = () => card.classList.remove('dragging');
    card.ondragover = (e) => e.preventDefault();
    grid.appendChild(card);
  });
}

function deletePhone(phone) {
  phoneOrder = phoneOrder.filter(p => p !== phone);
  saveMgmtData();
  renderMgmtGrid();
}

function loadMgmtData() {
  const saved = localStorage.getItem("sms_mgmt_data");
  if (saved) {
    const parsed = JSON.parse(saved);
    phoneOrder = parsed.order || Object.keys(parsed.mgmt || parsed);
  }
}

function saveMgmtData() { localStorage.setItem("sms_mgmt_data", JSON.stringify({ order: phoneOrder })); }

function addPhoneToMgmt(phone) {
  if (!phoneOrder.includes(phone)) { phoneOrder.unshift(phone); saveMgmtData(); renderMgmtGrid(); }
}

function tryOpenConfig() {
  document.getElementById("authPassword").value = "";
  document.getElementById("authModal").style.display = "flex";
  document.getElementById("authPassword").focus();
}

function closeAuthModal() { document.getElementById("authModal").style.display = "none"; }

function verifyPassword() {
  if (document.getElementById("authPassword").value === currentConfig.authPass) {
    closeAuthModal(); openConfig();
  } else { alert("密码错误！"); document.getElementById("authPassword").value = ""; }
}

function toggleConfigSection(id) {
  const sections = document.querySelectorAll('.config-section');
  sections.forEach(sec => {
    if (sec.id === id) sec.classList.toggle('active');
    else sec.classList.remove('active');
  });
}

function openConfig() {
  // 加载访问权限配置
  document.getElementById("cfgAccessPass").value = currentConfig.accessPass || accessConfig.accessPass;
  document.getElementById("cfgAllowPhones").value = currentConfig.allowPhones || accessConfig.allowPhones;
  
  // 加载原有配置
  document.getElementById("cfgServer").value = currentConfig.server;
  document.getElementById("cfgSid").value = currentConfig.sid;
  document.getElementById("cfgLoginUser").value = currentConfig.loginUser;
  document.getElementById("cfgLoginPass").value = currentConfig.loginPass;
  document.getElementById("cfgUser").value = currentConfig.user;
  document.getElementById("cfgPass").value = currentConfig.pass;
  document.getElementById("cfgToken").value = currentConfig.token;
  document.getElementById("cfgAuthPass").value = currentConfig.authPass;
  document.getElementById("cfgTplA").value = currentConfig.tplA || DEFAULT_TPL_A;
  document.getElementById("cfgTplB").value = currentConfig.tplB || DEFAULT_TPL_B;
  
  const sections = document.querySelectorAll('.config-section');
  sections.forEach(sec => sec.classList.remove('active'));
  document.getElementById("configModal").style.display = "flex";
}

function closeModal() { document.getElementById("configModal").style.display = "none"; }

function saveConfig() {
  // 验证访问密码
  const newAccessPass = document.getElementById("cfgAccessPass").value.trim();
  if (!newAccessPass) {
    return alert("访问密码不能为空！");
  }
  
  // 验证绑定手机号
  const newAllowPhones = document.getElementById("cfgAllowPhones").value.trim();
  if (!newAllowPhones) {
    return alert("绑定手机号不能为空！");
  }
  
  // 验证管理密码
  const newAuthPass = document.getElementById("cfgAuthPass").value;
  if (!/^\d{6}$/.test(newAuthPass)) {
    return alert("管理密码必须是6位数字！");
  }

  // 保存访问权限配置
  currentConfig.accessPass = newAccessPass;
  currentConfig.allowPhones = newAllowPhones;
  accessConfig.accessPass = newAccessPass;
  accessConfig.allowPhones = newAllowPhones;
  saveAccessConfig();

  // 保存原有配置
  currentConfig.server = document.getElementById("cfgServer").value;
  currentConfig.sid = document.getElementById("cfgSid").value;
  currentConfig.user = document.getElementById("cfgUser").value;
  currentConfig.pass = document.getElementById("cfgPass").value;
  currentConfig.loginUser = document.getElementById("cfgLoginUser").value;
  currentConfig.loginPass = document.getElementById("cfgLoginPass").value;
  currentConfig.token = document.getElementById("cfgToken").value;
  currentConfig.authPass = newAuthPass;
  currentConfig.tplA = document.getElementById("cfgTplA").value;
  currentConfig.tplB = document.getElementById("cfgTplB").value;
  
  localStorage.setItem("sms_stable_config", JSON.stringify(currentConfig));
  alert("已保存配置（包括访问权限设置）");
  closeModal();
  getBalance();
}

async function manualLogin() {
  if (await silentLogin()) {
    document.getElementById("cfgToken").value = currentConfig.token;
    alert("登录成功，Token 已更新");
    getBalance();
  } else alert("登录失败，请检查账号密码");
}

function handleServerChange() {
  const select = document.getElementById("cfgServer");
  const custom = document.getElementById("cfgServerCustom");
  custom.style.display = select.value === "custom" ? "block" : "none";
}

function exportData() {
  const data = { 
    config: currentConfig, 
    order: phoneOrder,
    accessConfig: accessConfig // 导出访问配置
  };
  const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `备份_${new Date().toLocaleDateString()}.json`;
  a.click();
}

function importData() {
  const input = prompt('请粘贴备份 JSON 数据：');
  if (!input) return;
  try {
    const data = JSON.parse(input);
    if (data.config) currentConfig = data.config;
    if (data.order) phoneOrder = data.order;
    if (data.accessConfig) accessConfig = data.accessConfig;
    
    localStorage.setItem("sms_stable_config", JSON.stringify(currentConfig));
    saveAccessConfig();
    saveMgmtData();
    location.reload();
  } catch (err) { alert('导入失败'); }
}
