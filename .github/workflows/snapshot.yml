name: YouTube Live Snapshot

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: youtube-live-snapshot
  cancel-in-progress: false

env:
  CAPTURE_URL: "https://china-xxoo.github.io/chinaxxoo/youtube-live-pages/"
  CAPTURE_WAIT_MS: "8000"
  MAX_SNAPSHOTS: "5"
  SITE_TIMEZONE: "Asia/Shanghai"

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install browser tools
        run: |
          set -euxo pipefail
          python3 -m pip install --user --upgrade playwright pillow
          python3 -m playwright install --with-deps chromium

      - name: Prepare GitHub Pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin gh-pages; then
            git clone --depth=1 --branch gh-pages "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" site
          else
            mkdir site
            cd site
            git init
            git checkout --orphan gh-pages
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          fi

      - name: Capture live room frame
        id: capture
        run: |
          set -euxo pipefail
          mkdir -p tmp
          if python3 scripts/capture_page_region.py \
            --url "$CAPTURE_URL" \
            --out tmp/snapshot.jpg \
            --selector "body" \
            --wait-ms "$CAPTURE_WAIT_MS"; then
            cp tmp/snapshot.jpg tmp/debug-player.jpg
            echo "captured=true" >> "$GITHUB_OUTPUT"
          else
            echo "Code-based player capture failed. Check the uploaded debug image."
            echo "captured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload debug player image
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-player
          path: |
            tmp/snapshot.jpg
            tmp/debug-player.jpg
          if-no-files-found: ignore
          retention-days: 1

      - name: Update static site
        if: steps.capture.outputs.captured == 'true'
        run: |
          set -euxo pipefail
          captured_at="$(TZ="$SITE_TIMEZONE" date -Iseconds)"
          python3 scripts/update_site.py \
            --site site \
            --public public \
            --snapshot tmp/snapshot.jpg \
            --captured-at "$captured_at" \
            --source-url "$CAPTURE_URL" \
            --max-snapshots "$MAX_SNAPSHOTS"

      - name: Publish to gh-pages
        if: steps.capture.outputs.captured == 'true'
        run: |
          set -euxo pipefail
          cd site
          git add .
          if git diff --cached --quiet; then
            echo "No page changes to publish."
            exit 0
          fi
          git commit -m "Update live snapshot"
          git push origin gh-pages
