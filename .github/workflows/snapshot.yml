name: YouTube Live Snapshot

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: youtube-live-snapshot
  cancel-in-progress: false

env:
  CAPTURE_BASE: "https://china-xxoo.github.io/chinaxxoo/youtube-live-pages/"
  CAPTURE_WAIT_MS: "65000"
  IMAGE_QUALITY: "72"
  MAX_SNAPSHOTS: "20"
  SITE_TIMEZONE: "Asia/Shanghai"
  VIDEO_IDS: "FS7IPxmfEms hWWFQd9aMvc UoAOBkGjFn0 u66ExGpIL-s EJpzQp_FPPM"

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Install browser tools
        run: |
          set -euxo pipefail
          python3 -m pip install --user --upgrade playwright pillow
          python3 -m playwright install --with-deps chromium

      - name: Pick random start
        id: pick
        run: |
          set -euxo pipefail
          read -ra ids <<< "$VIDEO_IDS"
          start_index=$(( RANDOM % ${#ids[@]} ))
          echo "start_index=$start_index" >> "$GITHUB_OUTPUT"

      - name: Capture live frame
        run: |
          set -euxo pipefail
          mkdir -p tmp
          read -ra ids <<< "$VIDEO_IDS"
          start_index="${{ steps.pick.outputs.start_index }}"
          for offset in $(seq 0 $((${#ids[@]} - 1))); do
            index=$(( (start_index + offset) % ${#ids[@]} ))
            video_id="${ids[$index]}"
            capture_url="${CAPTURE_BASE}?v=${video_id}"
            echo "Trying video_id=${video_id}"
            python3 scripts/capture_page_region.py \
              --url "$capture_url" \
              --out tmp/snapshot.jpg \
              --selector "#playerFrame" \
              --wait-ms "$CAPTURE_WAIT_MS" \
              --quality "$IMAGE_QUALITY"

            size="$(stat -c '%s' tmp/snapshot.jpg)"
            echo "Captured size=${size}"
            if [ "$size" -ge 30000 ]; then
              echo "SELECTED_INDEX=$index" >> "$GITHUB_ENV"
              echo "SELECTED_VIDEO_ID=$video_id" >> "$GITHUB_ENV"
              echo "SELECTED_CAPTURE_URL=$capture_url" >> "$GITHUB_ENV"
              exit 0
            fi
          done
          echo "No usable screenshot was captured."
          exit 1

      - name: Update page files
        run: |
          set -euxo pipefail
          export captured_at="$(TZ="$SITE_TIMEZONE" date -Iseconds)"
          python3 - <<'PY'
          import json
          import os
          import shutil
          from pathlib import Path

          captured_at = os.environ["captured_at"]
          max_snapshots = int(os.environ["MAX_SNAPSHOTS"])
          video_ids = os.environ["VIDEO_IDS"].split()
          video_id = os.environ["SELECTED_VIDEO_ID"]
          index = int(os.environ["SELECTED_INDEX"])
          snapshot = Path("tmp/snapshot.jpg")
          manifest_path = Path("manifest.json")
          snapshots_dir = Path("snapshots")
          snapshots_dir.mkdir(exist_ok=True)

          def safe_file_part(value):
              return "".join(char for char in value if char.isalnum() or char in "_-")[:64] or "stream"

          def history_name(iso_value, vid):
              name = iso_value.replace(":", "-").replace(".", "-")
              return f"snapshots/history-{name}-{safe_file_part(vid)}.jpg"

          def load_manifest():
              if not manifest_path.exists():
                  return {"latest": None, "streams": [], "snapshots": []}
              with manifest_path.open("r", encoding="utf-8") as handle:
                  return json.load(handle)

          manifest = load_manifest()
          previous_by_video_id = {
              item.get("videoId"): item
              for item in [*manifest.get("snapshots", []), *manifest.get("streams", [])]
              if item.get("videoId")
          }

          live_file = f"snapshots/live-{index + 1}-{safe_file_part(video_id)}.jpg"
          history_file = history_name(captured_at, video_id)
          shutil.copy2(snapshot, live_file)
          shutil.copy2(snapshot, history_file)
          shutil.copy2(snapshot, "latest.jpg")

          streams = []
          for stream_index, vid in enumerate(video_ids):
              previous = previous_by_video_id.get(vid, {})
              is_current = vid == video_id
              streams.append({
                  "label": f"直播{stream_index + 1}",
                  "videoId": vid,
                  "sourceUrl": f"https://www.youtube.com/watch?v={vid}",
                  "captureUrl": f"https://china-xxoo.github.io/chinaxxoo/youtube-live-pages/?v={vid}",
                  "file": live_file if is_current else previous.get("file"),
                  "capturedAt": captured_at if is_current else previous.get("capturedAt"),
                  "error": None if is_current else previous.get("error"),
              })

          history_entry = next(item for item in streams if item["videoId"] == video_id).copy()
          history_entry["file"] = history_file
          snapshots = [
              history_entry,
              *[
                  item
                  for item in manifest.get("snapshots", [])
                  if item.get("file") and item.get("file") != history_file
              ],
          ][:max_snapshots]

          keep = {item["file"] for item in streams if item.get("file")}
          keep.update(item["file"] for item in snapshots if item.get("file"))
          for old_file in snapshots_dir.glob("*.jpg"):
              path = f"snapshots/{old_file.name}"
              if path not in keep:
                  old_file.unlink()

          next_manifest = {
              "sourceUrls": [f"https://www.youtube.com/watch?v={vid}" for vid in video_ids],
              "rotation": {
                  "mode": "hourly",
                  "intervalMinutes": 60,
                  "streamCount": len(video_ids),
                  "activeVideoId": video_id,
              },
              "latest": {**history_entry, "file": "latest.jpg"},
              "streams": streams,
              "snapshots": snapshots,
          }
          with manifest_path.open("w", encoding="utf-8") as handle:
              json.dump(next_manifest, handle, ensure_ascii=False, indent=2)
              handle.write("\n")
          PY

      - name: Publish to main
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.jpg manifest.json snapshots
          if git diff --cached --quiet; then
            echo "No page changes to publish."
            exit 0
          fi
          git commit -m "Update random live snapshot"
          git push
