<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>YouTube Live</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #050505;
        overflow: hidden;
      }

      #playerFrame {
        display: block;
        width: 100vw;
        height: 100vh;
        border: 0;
      }
    </style>
  </head>
  <body>
    <iframe
      id="playerFrame"
      title="YouTube live player"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen>
    </iframe>

    <script>
      const defaultVideoId = "FS7IPxmfEms";

      function getVideoId() {
        const params = new URLSearchParams(window.location.search);
        const value = params.get("v") || params.get("videoId") || defaultVideoId;
        try {
          const url = new URL(value);
          if (url.hostname.includes("youtu.be")) return url.pathname.slice(1);
          if (url.pathname.startsWith("/live/")) return url.pathname.split("/")[2];
          return url.searchParams.get("v") || defaultVideoId;
        } catch (_error) {
          return value;
        }
      }

      const videoId = encodeURIComponent(getVideoId());
      const src =
        `https://www.youtube.com/embed/${videoId}` +
        "?feature=oembed&autoplay=1&mute=1&playsinline=1&rel=0";

      document.getElementById("playerFrame").src = src;
    </script>
  </body>
</html>
