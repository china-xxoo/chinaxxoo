<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>木木接码</title>
<style>
  /* 全局验证 */
  .login-box {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 99999;
  }
  .login-card {
    width: 90%;
    max-width: 350px;
    padding: 30px 20px;
    background: #f8f9fa;
    border-radius: 12px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }
  .login-title {
    text-align: center;
    font-size: 20px;
    margin-bottom: 20px;
    font-weight: bold;
  }
  .login-input {
    width: 100%;
    height: 44px;
    margin-bottom: 12px;
    padding: 0 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
  }
  .login-btn {
    width: 100%;
    height: 46px;
    background: #007bff;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
  }
  .tip {
    text-align: center;
    margin-top: 10px;
    font-size: 12px;
    color: #666;
  }
  .main-app {
    display: none;
  }
</style>
</head>
<body>

<!-- 登录界面 -->
<div class="login-box" id="loginBox">
  <div class="login-card">
    <div class="login-title">请登录</div>
    <input class="login-input" id="pwd" placeholder="访问密码" type="password">
    <input class="login-input" id="phone" placeholder="手机号">
    <button class="login-btn" onclick="login()">登录</button>
    <div class="tip">密码：1  手机号：1</div>
  </div>
</div>

<!-- 主程序（你原来的页面） -->
<div class="main-app" id="mainApp">
  <h1 style="text-align:center; margin-top:50px;">登录成功！欢迎使用</h1>
</div>

<script>
// 固定超级简单密码
const PASSWORD = "1";
const ALLOW_PHONE = "1";

function login() {
  var p = document.getElementById("pwd").value;
  var ph = document.getElementById("phone").value;

  if (p === PASSWORD && ph === ALLOW_PHONE) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
  } else {
    alert("账号或密码错误");
  }
}
</script>
</body>
</html>
