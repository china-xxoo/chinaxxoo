<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube Player Test</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #050505;
        overflow: hidden;
      }

      #playerShell {
        width: 100vw;
        height: 100vh;
        background: #050505;
      }

      #player {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="playerShell">
      <div id="player"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
      var player;

      function onYouTubeIframeAPIReady() {
        player = new YT.Player("player", {
          width: "100%",
          height: "100%",
          videoId: "hWWFQd9aMvc",
          playerVars: {
            autoplay: 1,
            mute: 1,
            playsinline: 1,
            origin: window.location.origin,
            rel: 0,
            controls: 1,
          },
          events: {
            onReady: function (event) {
              event.target.mute();
              event.target.playVideo();
            },
            onStateChange: function (event) {
              if (
                event.data === YT.PlayerState.CUED ||
                event.data === YT.PlayerState.PAUSED
              ) {
                event.target.mute();
                event.target.playVideo();
              }
            },
          },
        });
      }
    </script>
  </body>
</html>
